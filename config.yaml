valid_models:
  - random_forest
  - xgboost
  - lightgbm
  - sarimax
  - lstm
  - transformer

model_params:
  random_forest:
    n_estimators: 200
    random_state: 42
    n_jobs: -1

  xgboost:
    n_estimators: 200
    random_state: 42
    n_jobs: -1
    tree_method: hist

  lightgbm:
    n_estimators: 200
    random_state: 42
    n_jobs: -1
    verbose: -1

  sarimax:
    order: [1, 1, 1]
    seasonal_order: [1, 1, 1, 24]
    enforce_stationarity: false
    enforce_invertibility: false

  lstm:
    seq_len: 48
    hidden_size: 128
    num_layers: 2
    dropout: 0.2
    epochs: 30
    batch_size: 256
    learning_rate: 0.001

  transformer:
    seq_len: 48
    d_model: 64
    nhead: 4
    num_layers: 2
    dropout: 0.1
    epochs: 30
    batch_size: 256
    learning_rate: 0.001
